<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selamat Ulang Tahun</title>
    
    <!-- Mengambil Font dari Google Fonts (Poppins untuk body, Playfair Display untuk judul) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">

    <style>
        /* --- PENGATURAN DASAR (WARNA & LAYOUT) --- */
        body {
            margin: 0;
            padding: 0;
            background-color: #F5F5F0; /* Warna Cream muda untuk background */
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #4A4A4A; /* Warna teks abu-abu gelap agar tidak terlalu tajam */
        }

        /* --- KARTU UTAMA --- */
        .card {
            background-color: #FFFFFF;
            width: 90%;
            max-width: 400px;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); /* Bayangan halus */
            text-align: center;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px); /* Efek sedikit terangkat saat dihover */
        }

        /* --- FOTO PROFIL --- */
        .photo-container {
            width: 150px;
            height: 150px;
            margin: 0 auto 20px auto;
            border-radius: 50%; /* Membuat foto menjadi lingkaran */
            overflow: hidden;
            border: 4px solid #D8E2DC; /* Border warna Sage muda */
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Memastikan foto tidak gepeng */
        }

        /* --- TEKS --- */
        h1 {
            font-family: 'Playfair Display', serif; /* Font elegan untuk judul */
            font-size: 28px;
            color: #2C3E50;
            margin-bottom: 5px;
            margin-top: 0;
        }

        .sub-title {
            font-size: 14px;
            color: #95A5A6;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 25px;
        }

        .message {
            font-size: 15px;
            line-height: 1.8; /* Jarak baris agar mudah dibaca */
            color: #555555;
            margin-bottom: 30px;
        }

        /* --- TOMBOL (OPSIONAL) --- */
        .btn {
            display: inline-block;
            padding: 10px 25px;
            background-color: #8EACBB; /* Warna Sage Tua */
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-size: 14px;
            transition: background 0.3s;
        }

        .btn:hover {
            background-color: #7A96A5;
        }

        /* --- ANIMASI MASUK --- */
        .fade-in {
            animation: fadeIn 1.5s ease-in-out;
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="card fade-in">
        <!-- BAGIAN FOTO: Ganti 'foto.jpg' dengan nama file fotomu -->
        <div class="photo-container">
            <img src="yayaa.jpg" alt="Foto Ulang Tahun">
        </div>

        <!-- BAGIAN JUDUL -->
        <h1>Happy Birthday Sayangku</h1>
        <div class="sub-title">From Ajann</div>

        <!-- BAGIAN PESAN UTAMA -->
        <p class="message">
            Semoga kamu panjang umur dan sehat selalu yaa,
            Semoga urusan kamu selalu dimudahkan Allah, Aaminn
            Loveyouu Ayaa
            <br><br>
            Loveyouu my imup
        </p>

        <!-- BAGIAN FOOTER/TOMBOL -->
        <a href="#" class="btn">Dari: Ajann</a>
    </div>

</body>
</html>
